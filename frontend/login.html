<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портал сотрудников — NovaCorp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="logo-big">Nova<span>Corp</span></div>
      <p class="subtitle">Портал сотрудников — Защищённый доступ</p>

      <button class="metamask-btn" id="loginBtn" onclick="loginWithMetaMask()">
        <span>🦊</span> Войти через MetaMask
      </button>

      <div class="status-msg" id="statusMsg"></div>

      <p style="margin-top:2rem;font-size:0.8rem;color:#aaa">
        🔒 Защищено блокчейном Ethereum
      </p>
      <p style="margin-top:0.5rem">
        <a href="index.html" style="font-size:0.85rem;color:#1976d2">← На главную</a>
      </p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script>
    const API = 'http://localhost:8001';

    function setStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = `status-msg ${type}`;
    }

    async function loginWithMetaMask() {
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      setStatus('Подключение к MetaMask...', 'info');

      try {
        if (!window.ethereum) {
          setStatus('MetaMask не найден. Пожалуйста, установите расширение MetaMask для браузера.', 'error');
          btn.disabled = false;
          return;
        }

        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        const signer = provider.getSigner();
        const address = await signer.getAddress();

        setStatus('Запрос одноразового кода (nonce)...', 'info');

        // Step 1: Get nonce
        const nonceRes = await fetch(`${API}/auth/nonce`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address })
        });
        const { nonce } = await nonceRes.json();

        setStatus('Пожалуйста, подпишите сообщение в MetaMask...', 'info');

        // Step 2: Sign nonce
        const signature = await signer.signMessage(`Sign this nonce to login: ${nonce}`);

        setStatus('Верификация в блокчейне...', 'info');

        // Step 3: Verify
        const verifyRes = await fetch(`${API}/auth/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, signature })
        });

        if (!verifyRes.ok) {
          const err = await verifyRes.json();
          setStatus(`Доступ запрещён: ${err.detail}`, 'error');
          btn.disabled = false;
          return;
        }

        const { access_token, is_admin } = await verifyRes.json();
        localStorage.setItem('token', access_token);
        localStorage.setItem('address', address);
        localStorage.setItem('is_admin', is_admin);

        setStatus('Вход выполнен! Перенаправление...', 'success');

        setTimeout(() => {
          window.location.href = is_admin ? 'admin.html' : 'dashboard.html';
        }, 1000);

      } catch (err) {
        if (err.code === 4001) {
          setStatus('Подпись отклонена. Пожалуйста, попробуйте снова.', 'error');
        } else {
          setStatus(`Ошибка: ${err.message}`, 'error');
        }
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
